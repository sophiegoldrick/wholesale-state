                <div style={{fontSize:12,color:"#1E40AF",lineHeight:1.6}}>
                  <strong>How to flag a discrepancy:</strong> Open any order on the <strong>Orders</strong> tab → expand it → click <strong>⚑ Flag</strong> next to the problem item. It will appear here instantly.
                </div>
              </div>

              {discrepancies.length===0?(
                <div style={{textAlign:"center",padding:"80px 0",color:T.inkL}}>
                  <div style={{fontSize:52,marginBottom:14}}>✅</div>
                  <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:20,fontWeight:800,color:T.ink,marginBottom:8}}>No discrepancies logged</div>
                  <div style={{fontSize:13,maxWidth:400,margin:"0 auto",lineHeight:1.7}}>
                    When production misses an item, open the order on the <strong>Orders</strong> tab and click <strong>⚑ Flag</strong> next to the affected item.
                  </div>
                </div>
              ):(()=>{
                const open=discrepancies.filter(d=>d.status==="open");
                const inProgress=discrepancies.filter(d=>d.status==="in-progress");
                const resolved=discrepancies.filter(d=>d.status==="resolved");

                const mkDiscRow=(d)=>{
                  const statusCfg={
                    open:{color:T.red,bg:T.redL,border:"#FECACA",label:"Open"},
                    "in-progress":{color:T.amber,bg:T.amberL,border:T.amberB,label:"In Progress"},
                    resolved:{color:T.sage,bg:T.sageL,border:"#B8E6B8",label:"Resolved"},
                  };
                  const sc=statusCfg[d.status]||statusCfg.open;
                  const COURIER_LABEL={"COLDXPRESS":"Cold Xpress","DKDISTRIBUTION":"DK Distributions","COOLCOURIERS":"Cool Couriers"};
                  const updateDisc=(patch)=>{
                    setDiscrepancies(prev=>{
                      const updated=prev.map(x=>x.id===d.id?{...x,...patch}:x);
                      window.storage.set("ws-discrepancies",JSON.stringify(updated)).catch(()=>{});
                      return updated;
                    });
                  };
                  return(
                    <div key={d.id} className="disc-row" style={{border:`1.5px solid ${d.status==="resolved"?T.sageD+"33":d.status==="in-progress"?T.amberB:T.redB}`}}>
                      <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:12,padding:"16px 20px",alignItems:"start"}}>
                        <div>
                          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:7,flexWrap:"wrap"}}>
                            <span style={{fontFamily:"'Montserrat',sans-serif",fontSize:13,fontWeight:800,color:T.terra}}>{d.orderNumber}</span>
                            <span style={{fontSize:13,fontWeight:600,color:T.ink}}>{d.customer}</span>
                            {d.courier&&(
                              <span style={{fontSize:11,color:T.inkL,background:T.creamD,padding:"2px 8px",borderRadius:20,border:`1px solid ${T.border}`}}>
                                {COURIER_LABEL[d.courier]||d.courier}
                              </span>
                            )}
                            <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"3px 9px",borderRadius:20,fontSize:11,fontWeight:700,background:sc.bg,color:sc.color,border:`1px solid ${sc.border}`,fontFamily:"'Montserrat',sans-serif"}}>
                              <span style={{width:5,height:5,borderRadius:"50%",background:sc.color,flexShrink:0}}/>
                              {sc.label}
                            </span>
                          </div>
                          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                            <div style={{padding:"6px 14px",background:d.status==="resolved"?T.sageL:T.redL,border:`1.5px solid ${d.status==="resolved"?"#B8E6B8":T.redB}`,borderRadius:9,display:"inline-flex",alignItems:"center",gap:8}}>
                              <span style={{fontSize:14}}>{d.status==="resolved"?"✅":"🚩"}</span>
                              <span style={{fontFamily:"'Montserrat',sans-serif",fontSize:13,fontWeight:700,color:d.status==="resolved"?T.sageD:T.red}}>
                                {d.qty} × {d.itemName}
                              </span>
                            </div>
                          </div>
                          <div style={{display:"flex",gap:14,flexWrap:"wrap"}}>
                            <span style={{fontSize:11,color:T.inkL}}>🕐 Flagged {d.flaggedAt}</span>
                            {d.resolvedAt&&<span style={{fontSize:11,color:T.sageD,fontWeight:600}}>✓ Resolved {d.resolvedAt}</span>}
                            {d.notes&&<span style={{fontSize:11,color:T.inkM,fontStyle:"italic"}}>📝 {d.notes}</span>}
                          </div>
                        </div>
                        <div style={{display:"flex",flexDirection:"column",gap:7,alignItems:"flex-end",flexShrink:0}}>
                          <select
                            value={d.status}
                            onChange={e=>{
                              const ns=e.target.value;
                              updateDisc({status:ns,resolvedAt:ns==="resolved"?new Date().toLocaleString("en-AU"):null});
                            }}
                            style={{padding:"7px 12px",borderRadius:9,border:`1.5px solid ${sc.border}`,background:sc.bg,color:sc.color,fontFamily:"'Montserrat',sans-serif",fontSize:11,fontWeight:700,cursor:"pointer",outline:"none",minWidth:130}}
                          >
                            <option value="open">🔴 Open</option>
                            <option value="in-progress">🟡 In Progress</option>
                            <option value="resolved">✅ Resolved</option>
                          </select>
                          <div style={{display:"flex",gap:6}}>
                            <button onClick={()=>setTab("tracker")}
                              style={{padding:"5px 10px",borderRadius:7,border:`1px solid ${T.border}`,background:"none",color:T.inkL,fontSize:11,cursor:"pointer",fontFamily:"'Montserrat',sans-serif",fontWeight:600}}>
                              ↗ Order
                            </button>
                            <button onClick={()=>{
                              if(!window.confirm(`Remove discrepancy for ${d.itemName}?`)) return;
                              const updated=discrepancies.filter(x=>x.id!==d.id);
                              setDiscrepancies(updated);
                              window.storage.set("ws-discrepancies",JSON.stringify(updated)).catch(()=>{});
                            }}
                              style={{padding:"5px 8px",borderRadius:7,border:`1px solid ${T.border}`,background:"none",color:T.inkL,fontSize:13,cursor:"pointer"}}>
                              ✕
                            </button>
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                };

                return(
                  <div>
                    <div style={{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap"}}>
                      {[
                        [open.length,"Open",T.red,T.redL,"#FECACA"],
                        [inProgress.length,"In Progress",T.amber,T.amberL,T.amberB],
                        [resolved.length,"Resolved",T.sage,T.sageL,"#B8E6B8"],
                      ].map(([count,label,color,bg,border])=>(
                        <div key={label} style={{background:bg,border:`1.5px solid ${border}`,borderRadius:12,padding:"12px 20px",minWidth:110,textAlign:"center"}}>
                          <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:26,fontWeight:800,color,lineHeight:1}}>{count}</div>
                          <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:10,fontWeight:700,color,letterSpacing:.5,marginTop:4}}>{label.toUpperCase()}</div>
                        </div>
                      ))}
                    </div>
                    {open.length>0&&(
                      <div style={{marginBottom:22}}>
                        <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:11,fontWeight:700,color:T.red,letterSpacing:1.5,marginBottom:10}}>
                          🔴 OPEN DISCREPANCIES <span style={{background:T.redL,border:`1px solid #FECACA`,borderRadius:20,padding:"1px 9px",fontSize:10,color:T.red,marginLeft:6}}>{open.length}</span>
                        </div>
                        <div style={{display:"flex",flexDirection:"column",gap:10}}>{open.map(d=>mkDiscRow(d))}</div>
                      </div>
                    )}
                    {inProgress.length>0&&(
                      <div style={{marginBottom:22}}>
                        <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:11,fontWeight:700,color:T.amber,letterSpacing:1.5,marginBottom:10}}>
                          🟡 IN PROGRESS <span style={{background:T.amberL,border:`1px solid ${T.amberB}`,borderRadius:20,padding:"1px 9px",fontSize:10,color:T.amber,marginLeft:6}}>{inProgress.length}</span>
                        </div>
                        <div style={{display:"flex",flexDirection:"column",gap:10}}>{inProgress.map(d=>mkDiscRow(d))}</div>
                      </div>
                    )}
                    {resolved.length>0&&(
                      <div style={{marginBottom:22}}>
                        <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:11,fontWeight:700,color:T.sageD,letterSpacing:1.5,marginBottom:10}}>
                          ✅ RESOLVED <span style={{background:T.sageL,border:`1px solid ${T.sageD}44`,borderRadius:20,padding:"1px 9px",fontSize:10,color:T.sageD,marginLeft:6}}>{resolved.length}</span>
                        </div>
                        <div style={{display:"flex",flexDirection:"column",gap:10}}>{resolved.map(d=>mkDiscRow(d))}</div>
                      </div>
                    )}
                  </div>
                );
              })()}
            </div>
          )}

          {/* ═══ EMAIL HUB ═══ */}
          {tab==="email"&&(
            <div className="fu">
              <div style={{marginBottom:20,display:"flex",alignItems:"flex-end",justifyContent:"space-between"}}>
                <div><div className="sc">Email Hub</div><div className="ss">ORDERMENTUM ORDERS VIA OUTLOOK · AUTO-SYNC EVERY 3 MIN</div></div>
                {graphConnected&&(
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  <button onClick={async()=>{
                    try{await apiFetch('/api/graph/poll',{method:'POST'});alert('Inbox polled — check Orders tab for new orders.');}
                    catch(e){alert('Poll failed: '+e.message);}
                  }} className="btn-o" style={{fontSize:12}}>⟳ Poll Now</button>
                  <button className="btn-o" style={{fontSize:12,borderColor:T.sand,color:T.sand}} onClick={async()=>{
                    if(!confirm("This will clear parsed email history so the next poll re-processes all emails with the updated parser. Continue?")) return;
                    const r=await apiFetch("/api/clear-processed",{method:"POST"});
                    const d=await r.json();
                    if(d.ok) alert("Cleared — click Poll Now to re-parse all emails.");
                    else alert("Error: "+d.error);
                  }}>↺ Re-parse Emails</button>
                  </div>
                )}
              </div>

              {/* Connection card */}
              <div className="card" style={{marginBottom:16,border:`1.5px solid ${graphConnected?T.sage+'66':T.border}`}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:14}}>
                  <div style={{display:"flex",alignItems:"center",gap:14}}>
                    <div style={{width:48,height:48,borderRadius:13,background:graphConnected?T.sageL:T.creamDD,border:`1px solid ${graphConnected?T.sageD+'44':T.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>
                      {graphConnected?"📬":"📭"}
                    </div>
                    <div>
                      <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:3}}>
                        <span style={{fontFamily:"'Montserrat',sans-serif",fontSize:15,fontWeight:700,color:T.ink}}>Microsoft 365 / Outlook</span>
                        {graphConnected&&<span style={{fontSize:10,background:T.sageL,color:T.sageD,padding:"2px 9px",borderRadius:20,fontFamily:"'Montserrat',sans-serif",fontWeight:700,letterSpacing:.8,display:"flex",alignItems:"center",gap:4}}><span style={{width:6,height:6,borderRadius:"50%",background:T.sage,display:"inline-block"}}/>LIVE</span>}
                      </div>
                      <div style={{fontSize:13,color:T.inkL}}>
                        {graphConnected
                          ? `Connected · polling every 3 min · new Ordermentum orders auto-added`
                          : "Connect your Outlook inbox to automatically pull in new Ordermentum orders."}
                      </div>
                      {graphConnected&&graphConnectedAt&&(
                        <div style={{fontSize:11,color:T.inkL,marginTop:3}}>Connected {new Date(graphConnectedAt).toLocaleDateString('en-AU')}</div>
                      )}
                    </div>
                  </div>
                  {graphConnected
                    ? <button onClick={async()=>{
                        if(!window.confirm('Disconnect Outlook? Email auto-import will stop.')) return;
                        try{await apiFetch('/api/graph/disconnect',{method:'POST'});setGraphConnected(false);setGraphConnectedAt(null);}
                        catch(e){alert('Error: '+e.message);}
                      }} className="btn-o" style={{color:T.red,borderColor:T.red,flexShrink:0}}>Disconnect</button>
                    : <button onClick={()=>window.location.href='/api/graph/connect'} className="btn-t" style={{flexShrink:0}}>Connect Inbox</button>
                  }
                </div>

                {!graphConnected&&(
                  <div style={{marginTop:12,padding:"12px 15px",background:T.blueL,border:`1px solid #BFDBFE`,borderRadius:10}}>
                    <div style={{fontSize:13,color:T.inkM,lineHeight:1.7}}>
                      Click <strong>Connect Inbox</strong> to authorise this dashboard to read your Outlook inbox via Microsoft Graph.
                      You'll need your Azure app credentials set in Railway environment variables first — see <strong>DEPLOY.md</strong>.
                    </div>
                  </div>
                )}
              </div>

              {/* How it works */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
                <div className="card">
                  <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:10,fontWeight:700,color:T.inkL,letterSpacing:1,marginBottom:14}}>HOW IT WORKS</div>
                  {[
                    {n:"1",t:"Order email arrives",d:"From Ordermentum to admin@pressedjuices.com.au with OMO number",c:T.terra},
                    {n:"2",t:"Server parses email",d:"Extracts order number, customer, items, delivery date — every 3 min",c:T.sage},
                    {n:"3",t:"Added to Orders tab",d:"Appears as Order Confirmed — ready for CSV upload to generate files",c:T.sand},
                    {n:"4",t:"POD email received",d:"Courier sends delivery confirmation with OMO ref → auto-marked Delivered",c:T.teal},
                  ].map((s,i,arr)=>(
                    <div key={s.n} style={{display:"flex",gap:12,marginBottom:i<arr.length-1?12:0}}>
                      <div style={{width:26,height:26,borderRadius:"50%",background:s.c+"22",border:`1.5px solid ${s.c}55`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Montserrat',sans-serif",fontSize:11,fontWeight:700,color:s.c,flexShrink:0}}>{s.n}</div>
                      <div>
                        <div style={{fontSize:13,fontWeight:600,color:T.ink}}>{s.t}</div>
                        <div style={{fontSize:11,color:T.inkL,marginTop:2}}>{s.d}</div>
                      </div>
                    </div>
                  ))}
                </div>

                <div className="card">
                  <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:10,fontWeight:700,color:T.inkL,letterSpacing:1,marginBottom:14}}>WHAT GETS PARSED</div>
                  {[
                    ["OMO Number","Order reference from subject/body"],
                    ["Customer Name","From email subject line"],
                    ["Delivery Date","Due date extracted from body"],
                    ["Line Items","Products × quantities"],
                    ["Payment Method","Card / direct / other"],
                    ["Source","Tagged as 'email' so you know origin"],
                  ].map(([k,v])=>(
                    <div key={k} style={{display:"flex",gap:8,marginBottom:8,fontSize:12}}>
                      <span style={{color:T.inkL,width:110,flexShrink:0}}>{k}</span>
                      <span style={{color:T.ink}}>{v}</span>
                    </div>
                  ))}
                  <div style={{marginTop:8,padding:"8px 12px",background:T.amberL,border:`1px solid ${T.amberB}`,borderRadius:8,fontSize:11,color:T.amber}}>
                    ⚠️ Courier and suburb are blank until CSV upload — email gives the order, CSV gives the routing.
                  </div>
                </div>
              </div>

              {/* Setup checklist */}
              {!graphConnected&&(
                <div className="card">
                  <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:10,fontWeight:700,color:T.inkL,letterSpacing:1,marginBottom:14}}>SETUP CHECKLIST</div>
                  {[
                    ["Railway deployed","Your app is live at a railway.app URL"],
                    ["PostgreSQL added","Database provisioned in Railway project"],
                    ["Azure app registered","AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET set in Railway Variables"],
                    ["Redirect URI set","GRAPH_REDIRECT_URI matches your Azure app registration exactly"],
                    ["Connect Inbox","Click the button above and sign in with your Microsoft 365 account"],
                  ].map(([t,d],i)=>(
                    <div key={i} style={{display:"flex",gap:12,marginBottom:12,alignItems:"flex-start"}}>
                      <div style={{width:20,height:20,borderRadius:4,border:`1.5px solid ${T.border}`,flexShrink:0,marginTop:1}}/>
                      <div>
                        <div style={{fontSize:13,fontWeight:600,color:T.ink}}>{t}</div>
                        <div style={{fontSize:11,color:T.inkL}}>{d}</div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* ═══ SETTINGS ═══ */}
          {tab==="settings"&&(
            <SettingsPanel T={currentT} apiFetch={apiFetch} themeKey={themeKey} setTheme={setTheme} token={token} setToken={setToken}/>
          )}

        </main>
      </div>
    </>
  );
}

/* ─────────────────────────────────────────────────────────────────
   SETTINGS PANEL
   ───────────────────────────────────────────────────────────────── */
function SettingsPanel({T, apiFetch, themeKey, setTheme, token, setToken}){
  const[settingsTab,setSettingsTab]=useState("display");
  const[users,setUsers]=useState([]);
  const[usersLoading,setUsersLoading]=useState(false);
  const[inviteEmail,setInviteEmail]=useState('');
  const[inviteName,setInviteName]=useState('');
  const[inviteRole,setInviteRole]=useState('staff');
  const[inviteResult,setInviteResult]=useState(null);
  const[inviteLoading,setInviteLoading]=useState(false);
  const[notifSettings,setNotifSettings]=useState({newOrder:true,lowStock:true,deliveryConf:true,discrepancy:true,dailySummary:false,emailDigest:false,digestEmail:''});
  const[notifSaved,setNotifSaved]=useState(false);
  const[pwCurrent,setPwCurrent]=useState('');
  const[pwNew,setPwNew]=useState('');
  const[pwConfirm,setPwConfirm]=useState('');
  const[pwMsg,setPwMsg]=useState(null);
  const[bizSettings,setBizSettings]=useState({companyName:'Wholesale State',abn:'',contactEmail:'',contactPhone:'',address:'',defaultCourier:'',orderPrefix:'OMO',timezone:'Australia/Melbourne'});
  const[bizSaved,setBizSaved]=useState(false);
  const[currentUser,setCurrentUser]=useState(null);

  useEffect(()=>{
    // Load current user info
    apiFetch('/api/users/me').then(r=>r.json()).then(u=>setCurrentUser(u)).catch(()=>{});
    // Load notifications settings
    window.storage.get('ws-notif-settings').then(r=>{if(r)setNotifSettings(JSON.parse(r.value));}).catch(()=>{});
    // Load biz settings
    window.storage.get('ws-biz-settings').then(r=>{if(r)setBizSettings(s=>({...s,...JSON.parse(r.value)}));}).catch(()=>{});
  },[]);

  useEffect(()=>{
    if(settingsTab==='users') loadUsers();
  },[settingsTab]);

  async function loadUsers(){
    setUsersLoading(true);
    try{const r=await apiFetch('/api/users');const d=await r.json();setUsers(d.users||[]);}
    catch(e){}
    setUsersLoading(false);
  }

  async function sendInvite(){
    if(!inviteEmail||!inviteName)return;
    setInviteLoading(true);setInviteResult(null);
    try{
      const r=await apiFetch('/api/users/invite',{method:'POST',body:JSON.stringify({email:inviteEmail,name:inviteName,role:inviteRole})});
      const d=await r.json();
      if(d.ok){setInviteResult({ok:true,url:d.inviteUrl});setInviteEmail('');setInviteName('');loadUsers();}
      else setInviteResult({ok:false,msg:d.error});
    }catch(e){setInviteResult({ok:false,msg:e.message});}
    setInviteLoading(false);
  }

  async function toggleUserActive(id,active){
    await apiFetch(`/api/users/${id}`,{method:'PUT',body:JSON.stringify({is_active:active})});
    loadUsers();
  }

  async function changeUserRole(id,role){
    await apiFetch(`/api/users/${id}`,{method:'PUT',body:JSON.stringify({role})});
    loadUsers();
  }

  async function saveNotifSettings(){
    await window.storage.set('ws-notif-settings',JSON.stringify(notifSettings));
    setNotifSaved(true);setTimeout(()=>setNotifSaved(false),2000);
  }

  async function saveBizSettings(){
    await window.storage.set('ws-biz-settings',JSON.stringify(bizSettings));
    setBizSaved(true);setTimeout(()=>setBizSaved(false),2000);
  }

  async function changePassword(){
    setPwMsg(null);
    if(pwNew!==pwConfirm){setPwMsg({ok:false,msg:'Passwords do not match'});return;}
    if(pwNew.length<6){setPwMsg({ok:false,msg:'Min 6 characters'});return;}
    try{
      const r=await apiFetch('/api/users/change-own-password',{method:'POST',body:JSON.stringify({currentPassword:pwCurrent,newPassword:pwNew})});
      const d=await r.json();
      if(d.ok){setPwMsg({ok:true,msg:'Password updated'});setPwCurrent('');setPwNew('');setPwConfirm('');}
      else setPwMsg({ok:false,msg:d.error});
    }catch(e){setPwMsg({ok:false,msg:e.message});}
  }

  const isAdmin=currentUser?.role==='admin';

  const STabs=[
    {id:'display',label:'Display & Theme',icon:'🎨'},
    {id:'users',label:'Users & Access',icon:'👥'},
    {id:'notifications',label:'Notifications',icon:'🔔'},
    {id:'business',label:'Business Settings',icon:'🏢'},
    {id:'account',label:'My Account',icon:'🔑'},
  ];

  const cardStyle={background:T.white,border:`1px solid ${T.border}`,borderRadius:16,padding:24,marginBottom:16};
  const labelStyle={fontSize:11,fontWeight:700,color:T.inkL,letterSpacing:1,fontFamily:T.font,marginBottom:8,display:'block',textTransform:'uppercase'};
  const inputStyle={background:T.creamD,border:`1px solid ${T.border}`,borderRadius:8,padding:'9px 13px',fontFamily:T.fontBody,fontSize:13,color:T.ink,outline:'none',width:'100%',marginBottom:12};
  const sectionHead={fontSize:16,fontWeight:700,color:T.ink,fontFamily:T.font,marginBottom:4};
  const sectionSub={fontSize:12,color:T.inkL,marginBottom:20};

  return(
    <div className="fu">
      <div style={{marginBottom:24}}>
        <div className="sc">Settings</div>
        <div className="ss">MANAGE YOUR PLATFORM</div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'200px 1fr',gap:20,alignItems:'start'}}>

        {/* Sidebar nav */}
        <div style={{background:T.white,border:`1px solid ${T.border}`,borderRadius:14,padding:8,position:'sticky',top:80}}>
          {STabs.map(st=>(
            <button key={st.id} onClick={()=>setSettingsTab(st.id)}
              style={{display:'flex',alignItems:'center',gap:9,width:'100%',padding:'10px 12px',borderRadius:8,border:'none',cursor:'pointer',fontFamily:T.font,fontSize:12,fontWeight:600,letterSpacing:.3,
                background:settingsTab===st.id?T.accentL:'transparent',
                color:settingsTab===st.id?T.accent:T.inkM,
                marginBottom:2,textAlign:'left',transition:'all .15s'}}>
              <span style={{fontSize:15}}>{st.icon}</span>{st.label}
            </button>
          ))}
        </div>

        {/* Content area */}
        <div>

          {/* ── DISPLAY & THEME ── */}
          {settingsTab==='display'&&(
            <div>
              <div style={cardStyle}>
                <div style={sectionHead}>Display Theme</div>
                <div style={sectionSub}>Choose how Wholesale State looks. Your data is never affected by theme changes.</div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14}}>
                  {Object.entries(THEMES).map(([key,th])=>{
                    const active=themeKey===key;
                    return(
                      <button key={key} onClick={()=>setTheme(key)}
                        style={{border:`2px solid ${active?th.accent:T.border}`,borderRadius:14,padding:0,cursor:'pointer',background:'transparent',overflow:'hidden',transition:'all .2s',
                          boxShadow:active?`0 0 0 3px ${th.accent}33`:'none',textAlign:'left'}}>
                        {/* Mini preview */}
                        <div style={{background:th.cream,padding:'12px 14px 0'}}>
                          {/* Fake header bar */}
                          <div style={{background:th.headerBg,borderRadius:'8px 8px 0 0',padding:'6px 10px',display:'flex',alignItems:'center',gap:6,marginBottom:6,border:`1px solid ${th.navBorder}`}}>
                            <div style={{width:8,height:8,borderRadius:'50%',background:`linear-gradient(135deg,${th.accent},${th.accentD})`}}/>
                            <div style={{height:4,width:40,borderRadius:2,background:key==='executive'?'#7EB8F7':th.inkL,opacity:.4}}/>
                            <div style={{marginLeft:'auto',height:4,width:20,borderRadius:2,background:th.accent}}/>
                          </div>
                          {/* Fake cards */}
                          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:5,marginBottom:10}}>
                            {[th.accent,th.sage,th.sand,th.teal].map((c,i)=>(
                              <div key={i} style={{background:th.white,border:`1px solid ${th.border}`,borderRadius:6,padding:'6px 8px'}}>
                                <div style={{height:3,width:20,borderRadius:2,background:c,marginBottom:4}}/>
                                <div style={{height:6,width:28,borderRadius:2,background:c,fontWeight:900}}/>
                              </div>
                            ))}
                          </div>
                        </div>
                        <div style={{padding:'10px 14px',borderTop:`1px solid ${th.border}`,background:th.white,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                          <div>
                            <div style={{fontSize:12,fontWeight:700,color:th.ink,fontFamily:th.font}}>{th.name}</div>
                          </div>
                          {active&&<div style={{width:16,height:16,borderRadius:'50%',background:th.accent,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,color:'#fff',fontWeight:900}}>✓</div>}
                        </div>
                      </button>
                    );
                  })}
                </div>
                <div style={{marginTop:14,padding:'10px 14px',background:T.sageL,border:`1px solid ${T.sageD}33`,borderRadius:9,fontSize:12,color:T.inkM}}>
                  ✅ Theme changes apply instantly and save automatically. All your orders, stock, and data remain untouched.
                </div>
              </div>

              <div style={cardStyle}>
                <div style={sectionHead}>Interface Options</div>
                <div style={sectionSub}>Fine-tune how the platform behaves.</div>
                {[
                  ['Compact table rows','Show more orders per screen with reduced row height'],
                  ['Show order value in tracker','Display $ totals in the orders list'],
                  ['Auto-save CSV on upload','Automatically persist uploaded CSV data to the server'],
                ].map(([label,desc])=>(
                  <div key={label} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 0',borderBottom:`1px solid ${T.border}`}}>
                    <div>
                      <div style={{fontSize:13,fontWeight:600,color:T.ink}}>{label}</div>
                      <div style={{fontSize:11,color:T.inkL,marginTop:2}}>{desc}</div>
                    </div>
                    <div style={{width:38,height:22,borderRadius:11,background:T.accentL,border:`2px solid ${T.accent}`,cursor:'pointer',position:'relative',flexShrink:0}}>
                      <div style={{width:16,height:16,borderRadius:'50%',background:T.accent,position:'absolute',top:1,right:1,transition:'all .2s'}}/>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ── USERS & ACCESS ── */}
          {settingsTab==='users'&&(
            <div>
              {!isAdmin&&(
                <div style={{...cardStyle,background:T.amberL,border:`1px solid ${T.amberB}`}}>
                  <div style={{fontSize:13,color:T.amber,fontWeight:600}}>⚠️ Admin access required to manage users. Contact your administrator.</div>
                </div>
              )}

              {/* Invite new user */}
              <div style={cardStyle}>
                <div style={sectionHead}>Invite a Team Member</div>
                <div style={sectionSub}>Send an invite link. They'll set their own password when they accept.</div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
                  <div>
                    <label style={labelStyle}>Full Name</label>
                    <input style={inputStyle} value={inviteName} onChange={e=>setInviteName(e.target.value)} placeholder="e.g. Sarah Chen" disabled={!isAdmin}/>
                  </div>
                  <div>
                    <label style={labelStyle}>Email Address</label>
                    <input style={inputStyle} type="email" value={inviteEmail} onChange={e=>setInviteEmail(e.target.value)} placeholder="sarah@company.com.au" disabled={!isAdmin}/>
                  </div>
                </div>
                <div style={{marginBottom:16}}>
                  <label style={labelStyle}>Role</label>
                  <div style={{display:'flex',gap:10}}>
                    {[['admin','Admin','Full access — manage users, settings, all data'],['staff','Staff','Create orders, generate files, view all data'],['viewer','Viewer','Read-only — view orders and reports']].map(([r,l,d])=>(
                      <button key={r} onClick={()=>isAdmin&&setInviteRole(r)}
                        style={{flex:1,padding:'10px 12px',borderRadius:10,border:`1.5px solid ${inviteRole===r?T.accent:T.border}`,background:inviteRole===r?T.accentL:T.white,cursor:isAdmin?'pointer':'not-allowed',textAlign:'left',transition:'all .15s',opacity:isAdmin?1:.5}}>
                        <div style={{fontSize:12,fontWeight:700,color:inviteRole===r?T.accent:T.ink,fontFamily:T.font}}>{l}</div>
                        <div style={{fontSize:10,color:T.inkL,marginTop:3,lineHeight:1.4}}>{d}</div>
                      </button>
                    ))}
                  </div>
                </div>
                <button className="btn-t" onClick={sendInvite} disabled={!isAdmin||inviteLoading||!inviteEmail||!inviteName}>
                  {inviteLoading?'Sending…':'✉️ Send Invite Link'}
                </button>
                {inviteResult&&(
                  <div style={{marginTop:12,padding:'12px 14px',borderRadius:9,background:inviteResult.ok?T.sageL:T.redL,border:`1px solid ${inviteResult.ok?T.sageD+'33':T.redB}`,fontSize:12}}>
                    {inviteResult.ok?(
                      <div>
                        <div style={{fontWeight:700,color:T.sageD,marginBottom:6}}>✅ Invite link generated</div>
                        <div style={{color:T.inkM,marginBottom:8}}>Send this link to {inviteEmail||'the user'}:</div>
                        <div style={{background:T.white,border:`1px solid ${T.border}`,borderRadius:7,padding:'8px 12px',fontFamily:'monospace',fontSize:11,color:T.ink,wordBreak:'break-all'}}>{inviteResult.url}</div>
                        <button className="btn-o" style={{marginTop:8,fontSize:11}} onClick={()=>{navigator.clipboard.writeText(inviteResult.url);alert('Copied!');}}>📋 Copy link</button>
                      </div>
                    ):(
                      <div style={{color:T.red}}>⚠️ {inviteResult.msg}</div>
                    )}
                  </div>
                )}
              </div>

              {/* Users list */}
              <div style={cardStyle}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
                  <div>
                    <div style={sectionHead}>Team Members</div>
                    <div style={{fontSize:12,color:T.inkL}}>{users.length} user{users.length!==1?'s':''} total</div>
                  </div>
                  <button className="btn-o" onClick={loadUsers} style={{fontSize:11}}>↺ Refresh</button>
                </div>
                {usersLoading?(
                  <div style={{textAlign:'center',padding:32,color:T.inkL}}>Loading…</div>
                ):users.length===0?(
                  <div style={{textAlign:'center',padding:32,color:T.inkL}}>
                    <div style={{fontSize:32,marginBottom:8}}>👥</div>
                    <div style={{fontSize:13}}>No users yet. Invite your first team member above.</div>
                  </div>
                ):(
                  <div>
                    {/* Header */}
                    <div style={{display:'grid',gridTemplateColumns:'1fr 120px 100px 90px 80px',padding:'8px 14px',background:T.creamD,borderRadius:'8px 8px 0 0',gap:10}}>
                      {['Name / Email','Role','Last Login','Status','Actions'].map(h=>(
                        <span key={h} style={{fontSize:10,fontWeight:700,color:T.inkL,letterSpacing:.8,fontFamily:T.font,textTransform:'uppercase'}}>{h}</span>
                      ))}
                    </div>
                    {users.map((u,i)=>(
                      <div key={u.id} style={{display:'grid',gridTemplateColumns:'1fr 120px 100px 90px 80px',padding:'12px 14px',gap:10,borderBottom:i<users.length-1?`1px solid ${T.creamD}`:'none',alignItems:'center',background:i%2===0?T.white:T.cream}}>
                        <div>
                          <div style={{fontSize:13,fontWeight:600,color:T.ink}}>{u.name}</div>
                          <div style={{fontSize:11,color:T.inkL,marginTop:1}}>{u.email}</div>
                          {!u.password_hash&&<span style={{fontSize:9,fontWeight:700,color:T.amber,background:T.amberL,padding:'1px 6px',borderRadius:4,letterSpacing:.5}}>INVITE PENDING</span>}
                        </div>
                        <select value={u.role} onChange={e=>isAdmin&&changeUserRole(u.id,e.target.value)} disabled={!isAdmin}
                          style={{background:T.creamD,border:`1px solid ${T.border}`,borderRadius:6,padding:'5px 8px',fontSize:11,color:T.ink,cursor:isAdmin?'pointer':'not-allowed',fontFamily:T.fontBody}}>
                          <option value="admin">Admin</option>
                          <option value="staff">Staff</option>
                          <option value="viewer">Viewer</option>
                        </select>
                        <div style={{fontSize:11,color:T.inkL}}>{u.last_login_at?new Date(u.last_login_at).toLocaleDateString('en-AU',{day:'numeric',month:'short'}):'Never'}</div>
                        <div>
                          <span style={{fontSize:10,fontWeight:700,padding:'3px 8px',borderRadius:20,
                            background:u.is_active?T.sageL:T.creamDD,
                            color:u.is_active?T.sageD:T.inkL,
                            border:`1px solid ${u.is_active?T.sageD+'33':T.border}`}}>
                            {u.is_active?'Active':'Inactive'}
                          </span>
                        </div>
                        <div style={{display:'flex',gap:5}}>
                          {isAdmin&&<button onClick={()=>toggleUserActive(u.id,!u.is_active)} title={u.is_active?'Deactivate':'Reactivate'}
                            style={{width:28,height:28,borderRadius:7,border:`1px solid ${T.border}`,background:'none',cursor:'pointer',fontSize:13,display:'flex',alignItems:'center',justifyContent:'center',color:u.is_active?T.red:T.sage}}>
                            {u.is_active?'🚫':'✅'}
                          </button>}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>

              {/* Role guide */}
              <div style={cardStyle}>
                <div style={sectionHead}>Role Permissions</div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginTop:14}}>
                  {[
                    {role:'Admin',color:T.accent,perms:['Invite & manage users','Change display settings','View all data & reports','Generate all files','Manage integrations','Change business settings']},
                    {role:'Staff',color:T.sage,perms:['Upload CSV files','Generate manifests','Track & update orders','View all reports','Manage stocktake','Cannot manage users']},
                    {role:'Viewer',color:T.sand,perms:['View orders & tracker','View reports & dashboard','View stocktake levels','No file generation','No settings access','Read-only']},
                  ].map(({role,color,perms})=>(
                    <div key={role} style={{background:T.creamD,borderRadius:10,padding:'14px 16px',border:`1px solid ${T.border}`}}>
                      <div style={{fontSize:13,fontWeight:700,color,fontFamily:T.font,marginBottom:10}}>{role}</div>
                      {perms.map(p=>(
                        <div key={p} style={{fontSize:11,color:T.inkM,marginBottom:5,display:'flex',gap:6,alignItems:'flex-start'}}>
                          <span style={{color,flexShrink:0,marginTop:1}}>·</span>{p}
                        </div>
                      ))}
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* ── NOTIFICATIONS ── */}
          {settingsTab==='notifications'&&(
            <div>
              <div style={cardStyle}>
                <div style={sectionHead}>In-App Alerts</div>
                <div style={sectionSub}>Control which events trigger alerts within the dashboard.</div>
                {[
                  ['newOrder','New order received','Show alert when a new Ordermentum order is detected'],
                  ['lowStock','Low stock warning','Alert when any SKU drops below minimum threshold'],
                  ['deliveryConf','Delivery confirmation','Alert when a POD email is received and an order is marked delivered'],
                  ['discrepancy','Discrepancy flagged','Alert when a line item is flagged as a discrepancy'],
                ].map(([key,label,desc])=>(
                  <div key={key} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 0',borderBottom:`1px solid ${T.border}`}}>
                    <div style={{flex:1,paddingRight:20}}>
                      <div style={{fontSize:13,fontWeight:600,color:T.ink}}>{label}</div>
                      <div style={{fontSize:11,color:T.inkL,marginTop:3}}>{desc}</div>
                    </div>
                    <button onClick={()=>setNotifSettings(s=>({...s,[key]:!s[key]}))}
                      style={{width:42,height:24,borderRadius:12,border:'none',cursor:'pointer',position:'relative',flexShrink:0,transition:'background .2s',
                        background:notifSettings[key]?T.accent:T.creamDD}}>
                      <div style={{width:18,height:18,borderRadius:'50%',background:'#fff',position:'absolute',top:3,transition:'left .2s',
                        left:notifSettings[key]?'21px':'3px',boxShadow:'0 1px 3px rgba(0,0,0,.2)'}}/>
                    </button>
                  </div>
                ))}
              </div>

              <div style={cardStyle}>
                <div style={sectionHead}>Email Digest</div>
                <div style={sectionSub}>Receive a daily summary email with orders, delivery status, and any flags.</div>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 0',borderBottom:`1px solid ${T.border}`,marginBottom:14}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,color:T.ink}}>Daily summary email</div>
                    <div style={{fontSize:11,color:T.inkL,marginTop:3}}>Sent each morning with the previous day's activity</div>
                  </div>
                  <button onClick={()=>setNotifSettings(s=>({...s,dailySummary:!s.dailySummary}))}
                    style={{width:42,height:24,borderRadius:12,border:'none',cursor:'pointer',position:'relative',flexShrink:0,transition:'background .2s',
                      background:notifSettings.dailySummary?T.accent:T.creamDD}}>
                    <div style={{width:18,height:18,borderRadius:'50%',background:'#fff',position:'absolute',top:3,transition:'left .2s',
                      left:notifSettings.dailySummary?'21px':'3px',boxShadow:'0 1px 3px rgba(0,0,0,.2)'}}/>
                  </button>
                </div>
                {notifSettings.dailySummary&&(
                  <div>
                    <label style={labelStyle}>Send digest to</label>
                    <input style={inputStyle} type="email" value={notifSettings.digestEmail} onChange={e=>setNotifSettings(s=>({...s,digestEmail:e.target.value}))} placeholder="admin@pressedjuices.com.au"/>
                  </div>
                )}
                <button className="btn-t" onClick={saveNotifSettings}>
                  {notifSaved?'✅ Saved!':'Save Notification Settings'}
                </button>
              </div>

              <div style={cardStyle}>
                <div style={sectionHead}>Notification Log</div>
                <div style={sectionSub}>Recent system events and alerts.</div>
                {[
                  {icon:'📬',msg:'New order OMO-09211 received from Harris Farm Markets',time:'Today 9:42am',color:T.sage},
                  {icon:'✅',msg:'POD confirmed — OMO-09207 Pressed Juices Bondi — marked delivered',time:'Today 8:15am',color:T.teal},
                  {icon:'⚠️',msg:'Discrepancy flagged on OMO-09204 — Roots 350ml qty mismatch',time:'Yesterday 4:33pm',color:T.amber},
                  {icon:'📦',msg:'Low stock alert — Immunity 350ml at 24 units',time:'Yesterday 2:10pm',color:T.red},
                ].map((n,i)=>(
                  <div key={i} style={{display:'flex',gap:12,padding:'11px 0',borderBottom:i<3?`1px solid ${T.creamD}`:'none',alignItems:'flex-start'}}>
                    <div style={{width:32,height:32,borderRadius:9,background:n.color+'18',display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,flexShrink:0}}>{n.icon}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:12,color:T.ink,lineHeight:1.5}}>{n.msg}</div>
                      <div style={{fontSize:10,color:T.inkL,marginTop:3}}>{n.time}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ── BUSINESS SETTINGS ── */}
          {settingsTab==='business'&&(
            <div>
              <div style={cardStyle}>
                <div style={sectionHead}>Company Details</div>
                <div style={sectionSub}>Used on generated documents and manifests.</div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                  {[
                    ['companyName','Company Name','text','Wholesale State'],
                    ['abn','ABN','text','12 345 678 901'],
                    ['contactEmail','Contact Email','email','admin@pressedjuices.com.au'],
                    ['contactPhone','Contact Phone','tel','+61 2 9000 0000'],
                  ].map(([key,label,type,ph])=>(
                    <div key={key}>
                      <label style={labelStyle}>{label}</label>
                      <input style={inputStyle} type={type} value={bizSettings[key]||''} onChange={e=>setBizSettings(s=>({...s,[key]:e.target.value}))} placeholder={ph}/>
                    </div>
                  ))}
                </div>
                <div>
                  <label style={labelStyle}>Business Address</label>
                  <input style={inputStyle} value={bizSettings.address||''} onChange={e=>setBizSettings(s=>({...s,address:e.target.value}))} placeholder="123 Smith St, Collingwood VIC 3066"/>
                </div>
              </div>

              <div style={cardStyle}>
                <div style={sectionHead}>Order Defaults</div>
                <div style={sectionSub}>Default values used when creating new orders.</div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                  <div>
                    <label style={labelStyle}>Default Courier</label>
                    <select value={bizSettings.defaultCourier||''} onChange={e=>setBizSettings(s=>({...s,defaultCourier:e.target.value}))}
                      style={{...inputStyle,marginBottom:0,cursor:'pointer'}}>
                      <option value="">— Select —</option>
                      <option value="COLDXPRESS">ColdXpress</option>
                      <option value="DKDISTRIBUTION">DK Distribution</option>
                      <option value="COOLCOURIERS">Cool Couriers</option>
                    </select>
                  </div>
                  <div>
                    <label style={labelStyle}>Timezone</label>
                    <select value={bizSettings.timezone||'Australia/Melbourne'} onChange={e=>setBizSettings(s=>({...s,timezone:e.target.value}))}
                      style={{...inputStyle,marginBottom:0,cursor:'pointer'}}>
                      {['Australia/Melbourne','Australia/Sydney','Australia/Brisbane','Australia/Perth','Australia/Adelaide'].map(tz=>(
                        <option key={tz} value={tz}>{tz.replace('Australia/','')}</option>
                      ))}
                    </select>
                  </div>
                </div>
              </div>

              <div style={cardStyle}>
                <div style={sectionHead}>Integrations</div>
                <div style={sectionSub}>Connected services and external platforms.</div>
                {[
                  {name:'Ordermentum',desc:'Order import via email parsing',status:'active',icon:'🧾'},
                  {name:'Microsoft 365 / Outlook',desc:'Email inbox connection for auto-import',status:'active',icon:'📬'},
                  {name:'ColdXpress',desc:'Manifest generation & courier dispatch',status:'active',icon:'❄️'},
                  {name:'DK Distribution',desc:'Jobs sheet generation',status:'active',icon:'🚛'},
                  {name:'Shopify',desc:'Direct storefront order sync',status:'inactive',icon:'🛒'},
                  {name:'Xero',desc:'Accounting & invoice sync',status:'inactive',icon:'💼'},
                ].map(intg=>(
                  <div key={intg.name} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 0',borderBottom:`1px solid ${T.border}`}}>
                    <div style={{display:'flex',alignItems:'center',gap:12}}>
                      <div style={{width:36,height:36,borderRadius:9,background:intg.status==='active'?T.sageL:T.creamDD,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>{intg.icon}</div>
                      <div>
                        <div style={{fontSize:13,fontWeight:600,color:T.ink}}>{intg.name}</div>
                        <div style={{fontSize:11,color:T.inkL,marginTop:1}}>{intg.desc}</div>
                      </div>
                    </div>
                    <span style={{fontSize:10,fontWeight:700,padding:'3px 10px',borderRadius:20,
                      background:intg.status==='active'?T.sageL:T.creamDD,
                      color:intg.status==='active'?T.sageD:T.inkL,
                      border:`1px solid ${intg.status==='active'?T.sageD+'33':T.border}`}}>
                      {intg.status==='active'?'Connected':'Not connected'}
                    </span>
                  </div>
                ))}
              </div>

              <button className="btn-t" onClick={saveBizSettings} style={{marginBottom:16}}>
                {bizSaved?'✅ Saved!':'Save Business Settings'}
              </button>
            </div>
          )}

          {/* ── MY ACCOUNT ── */}
          {settingsTab==='account'&&(
            <div>
              {currentUser&&(
                <div style={cardStyle}>
                  <div style={sectionHead}>Your Profile</div>
                  <div style={sectionSub}>Your account details on Wholesale State.</div>
                  <div style={{display:'flex',alignItems:'center',gap:16,padding:'16px 0',borderBottom:`1px solid ${T.border}`,marginBottom:16}}>
                    <div style={{width:56,height:56,borderRadius:16,background:T.accentL,border:`2px solid ${T.accent}33`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,fontWeight:800,color:T.accent,fontFamily:T.font,flexShrink:0}}>
                      {(currentUser.name||'?')[0].toUpperCase()}
                    </div>
                    <div>
                      <div style={{fontSize:17,fontWeight:700,color:T.ink,fontFamily:T.font}}>{currentUser.name||'—'}</div>
                      <div style={{fontSize:12,color:T.inkL,marginTop:2}}>{currentUser.email||'Shared account'}</div>
                      <span style={{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:20,marginTop:4,display:'inline-block',
                        background:currentUser.role==='admin'?T.accentL:T.sageL,
                        color:currentUser.role==='admin'?T.accent:T.sageD,
                        border:`1px solid ${currentUser.role==='admin'?T.accent+'33':T.sageD+'33'}`}}>
                        {(currentUser.role||'staff').toUpperCase()}
                      </span>
                    </div>
                  </div>
                  <div style={{fontSize:12,color:T.inkL}}>
                    Last login: {currentUser.last_login_at?new Date(currentUser.last_login_at).toLocaleString('en-AU'):'—'}
                  </div>
                </div>
              )}

              <div style={cardStyle}>
                <div style={sectionHead}>Change Password</div>
                <div style={sectionSub}>Must be at least 6 characters.</div>
                <div style={{maxWidth:380}}>
                  <label style={labelStyle}>Current Password</label>
                  <input style={inputStyle} type="password" value={pwCurrent} onChange={e=>setPwCurrent(e.target.value)} placeholder="Current password"/>
                  <label style={labelStyle}>New Password</label>
                  <input style={inputStyle} type="password" value={pwNew} onChange={e=>setPwNew(e.target.value)} placeholder="New password"/>
                  <label style={labelStyle}>Confirm New Password</label>
                  <input style={inputStyle} type="password" value={pwConfirm} onChange={e=>setPwConfirm(e.target.value)} placeholder="Confirm new password"/>
                  {pwMsg&&<div style={{fontSize:12,color:pwMsg.ok?T.sageD:T.red,marginBottom:10,fontWeight:600}}>{pwMsg.ok?'✅':' ⚠️'} {pwMsg.msg}</div>}
                  <button className="btn-t" onClick={changePassword} disabled={!pwCurrent||!pwNew||!pwConfirm}>
                    Update Password
                  </button>
                </div>
              </div>

              <div style={cardStyle}>
                <div style={sectionHead}>Session</div>
                <div style={sectionSub}>Manage your current login session.</div>
                <button className="btn-o" style={{color:T.red,borderColor:T.red}} onClick={()=>{
                  if(!window.confirm('Sign out of Wholesale State?')) return;
                  localStorage.removeItem('ws-token');
                  setToken(null);
                }}>Sign Out</button>
              </div>

              <div style={cardStyle}>
                <div style={sectionHead}>About</div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:0}}>
                  {[
                    ['Platform','Wholesale State Operations'],
                    ['Version','2.0.0'],
                    ['Environment',window.location.hostname==='localhost'?'Local dev':'Production'],
                    ['Database','PostgreSQL (Railway)'],
                    ['Email','Microsoft Graph API'],
                    ['Hosting','Render / Railway'],
                  ].map(([k,v])=>(
                    <div key={k} style={{padding:'10px 0',borderBottom:`1px solid ${T.creamD}`,display:'flex',gap:8}}>
                      <span style={{fontSize:11,color:T.inkL,width:110,flexShrink:0}}>{k}</span>
                      <span style={{fontSize:12,color:T.ink,fontWeight:500}}>{v}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

        </div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
